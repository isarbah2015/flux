# Flux API — permanent hosted backend (Render Blueprint)
# Deploy: https://dashboard.render.com/blueprints → New Blueprint Instance → connect isarbah2015/flux
# After deploy, set EXPO_PUBLIC_API_URL to the service URL (e.g. https://flux-api.onrender.com)

databases:
  - name: flux-db
    plan: free
    databaseName: flux
    user: flux

services:
  - type: web
    name: flux-api
    runtime: node
    region: frankfurt
    plan: free
    healthCheckPath: /api/healthz
    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm --filter @workspace/api-server run build
    startCommand: bash scripts/render-start.sh
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: FLUX_ENV
        value: testing
      - key: PORT
        value: "8080"
      - key: FIREBASE_PROJECT_ID
        value: flux-screenshotos
      - key: PREMIUM_GRANT_EMAILS
        value: isarbah2015@gmail.com
      - key: DATABASE_URL
        fromDatabase:
          name: flux-db
          property: connectionString
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
